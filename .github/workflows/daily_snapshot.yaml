name: Daily Portfolio Snapshot

on:
  schedule:
    - cron: '30 21 * * *' 
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run snapshot script
        run: python save_snapshot.py
        env:
          CUOTAS_RISKY_NORRISL: ${{ secrets.CUOTAS_RISKY_NORRIS }}
          CUOTAS_CONSERVATIVE_STREEP: ${{ secrets.CUOTAS_CONSERVATIVE_STREEP }}
          RACIONAL_LTM_SHARES: ${{ secrets.RACIONAL_LTM_SHARES }}
          RACIONAL_META_SHARES: ${{ secrets.RACIONAL_META_SHARES }}
          RACIONAL_AMZN_SHARES: ${{ secrets.RACIONAL_AMZN_SHARES }}
          RACIONAL_MSFT_SHARES: ${{ secrets.RACIONAL_MSFT_SHARES }}
          BINANCE_BTC_AMOUNT: ${{ secrets.BINANCE_BTC_AMOUNT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
