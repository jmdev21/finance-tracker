name: Daily Portfolio Snapshot

on:
  schedule:
    - cron: '20 15 * * *' 
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run snapshot script
        run: python save_snapshot.py
        env:
          FINTUAL_EMAIL: ${{ secrets.FINTUAL_EMAIL }}
          FINTUAL_PASSWORD: ${{ secrets.FINTUAL_PASSWORD }}
          RACIONAL_LTM_SHARES: ${{ secrets.RACIONAL_LTM_SHARES }}
          RACIONAL_META_SHARES: ${{ secrets.RACIONAL_META_SHARES }}
          RACIONAL_AMZN_SHARES: ${{ secrets.RACIONAL_AMZN_SHARES }}
          RACIONAL_MSFT_SHARES: ${{ secrets.RACIONAL_MSFT_SHARES }}
          BINANCE_BTC_AMOUNT: ${{ secrets.BINANCE_BTC_AMOUNT }}

      - name: Commit updated CSV
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add database/historical_data.csv
          git commit -m "📊 Daily snapshot" || echo "No changes"
          git push
